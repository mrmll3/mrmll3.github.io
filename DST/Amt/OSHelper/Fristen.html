<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="shortcut icon" href="./assets/img/240px-Bundesagentur_für_Arbeit_logo.png" type="image/x-icon">

    <title>Fristenrechner</title>
</head>

<body>
    <h1>Fristenrechner</h1>
    <form id="formDateDif">
        <label for="date">Datum:</label>
        <input type="date" id="date" name="date"><br>

        <label for="months">Kalendermonate:</label>
        <input type="number" id="months" name="months" value="0"><br>

        <label for="years">Jahre:</label>
        <input type="number" id="years" name="years" value="0"><br>

        <label for="weeks">Wochen:</label>
        <input type="number" id="weeks" name="weeks" value="0"><br>

        <label for="days">Tage:</label>
        <input type="number" id="days" name="days" value="0"><br>

        <button type="submit" id="calulate-button">Berechnen</button>
    </form>

    <p id="result"></p>
</body>
<script type="module" src="./assets/js/dateDif.js"></script>

</html>
